{% extends "base.html" %}
{% block title %}Report an Issue – DAS{% endblock %}
{% block content %}
<div class="login-container">
    <div class="login-card" style="width: 450px;">
        <h2>🚨 Quick Report</h2>
        <p style="color:var(--text-muted); margin-bottom: 20px;">Report a breakdown anonymously</p>
        
        <form method="POST">
            <div class="form-group">
                <label>Select Affected Machine/Asset</label>
                <select name="asset_id" required 
                        style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid var(--bg3); background: var(--bg2); color: var(--text);">
                    <option value="" disabled selected>-- Select Asset (ID - Name) --</option>
                    {% for asset in assets %}
                    <option value="{{ asset.assetid }}">
                        #{{ "%04d" % asset.assetid }} — {{ asset.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group" style="margin-top:15px;">
                <label>What is the problem? (Optional)</label>
                <textarea name="description" placeholder="Describe the issue..." style="height:100px;"></textarea>
            </div>
            
            <div class="form-group" style="margin-top:15px;">
                <label>Your Mobile Number</label>
                <input type="text" name="mobile" placeholder="07x xxxxxxx" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:20px;">Submit Report</button>
            <a href="{{ url_for('login') }}" style="display:block; text-align:center; margin-top:15px; color:var(--text-dim);">Back to Login</a>
        </form>
    </div>
</div>
{% endblock %}
