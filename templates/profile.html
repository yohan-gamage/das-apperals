{% extends "base.html" %}
{% block title %}My Profile – DAS{% endblock %}
{% block content %}
<div class="profile-container" style="max-width: 800px; margin: 40px auto; position: relative;">
    
    <div class="card" style="padding: 0; overflow: hidden; border: 1px solid var(--bg3);">
        
        <div style="background: linear-gradient(135deg, #2c3e50, #1a252f); padding: 30px; position: relative; border-bottom: 1px solid var(--bg3);">
            <div style="display: flex; align-items: center; gap: 20px;">
                <div style="width: 80px; height: 80px; background: #f1c40f; color: #2c3e50; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; border: 4px solid var(--bg1);">
                    {{ user.name[0] | upper }}
                </div>
                <div>
                    <h2 style="margin: 0; color: white;">{{ user.name }}</h2>
                    <p style="margin: 0; color: rgba(255,255,255,0.6);">@{{ user.username }} | {{ user.speciality }}</p>
                </div>
            </div>

            <div style="position: absolute; top: 25px; right: 25px;">
                <a href="{{ url_for('my_jobs') }}" class="notification-wrapper" style="text-decoration: none; position: relative; display: inline-block;">
        
                    <div style="background: rgba(255,255,255,0.15); width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s;">
                        <span style="font-size: 24px;">💼</span>
                    </div>

                    {% if ongoing_count > 0 %}
                    <span class="mobile-badge">
                        {{ pending_count }}
                    </span>
                    {% endif %}
                </a>
            </div>
        </div>

        <div style="padding: 40px;">
            <h3 style="margin-top: 0; margin-bottom: 25px; border-left: 4px solid #f1c40f; padding-left: 15px;">👤 Account Settings</h3>
            
            <form method="POST">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label style="color: var(--text-muted); font-size: 12px; text-transform: uppercase; font-weight: 700;">Full Name</label>
                        <input type="text" name="name" value="{{ user.name }}" required style="width: 100%; padding: 12px; margin-top: 5px;">
                    </div>
                    <div class="form-group">
                        <label style="color: var(--text-muted); font-size: 12px; text-transform: uppercase; font-weight: 700;">Username</label>
                        <input type="text" name="username" value="{{ user.username }}" required style="width: 100%; padding: 12px; margin-top: 5px;">
                    </div>
                </div>

                <div class="form-group" style="margin-top: 25px;">
                    <label style="color: var(--text-muted); font-size: 12px; text-transform: uppercase; font-weight: 700;">New Password (Leave blank to keep current)</label>
                    <input type="password" name="password" placeholder="••••••••" style="width: 100%; padding: 12px; margin-top: 5px;">
                </div>

                <div style="margin-top: 35px; text-align: right;">
                    <button type="submit" class="btn btn-primary" style="padding: 12px 40px; font-weight: 600;">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
